databases:
  - name: agencyos-db
    plan: free
    databaseName: agencyos
    user: agencyos

services:
  - type: web
    name: agencyos-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_ENABLED
        value: true
      - key: RBAC_ENFORCED
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: agencyos-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: KEYCLOAK_ISSUER_URL
        sync: false
      - key: KEYCLOAK_JWKS_URI
        sync: false
      - key: KEYCLOAK_AUDIENCE
        value: agencyos-api
      - key: STORAGE_LOCAL_PATH
        value: /app/uploads
      - key: SWAGGER_ENABLED
        value: false
    disk:
      name: agencyos-uploads
      mountPath: /app/uploads
      sizeGB: 1
