name: Deploy

on:
  push:
    branches: [main]

# Runs deploy.sh on the VPS. That script is idempotent: git sync, build,
# PM2 restart (PORT=3001), nginx site install from the repo, health check.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROJECT_PATH
          script: |
            set -euo pipefail
            test -n "${PROJECT_PATH:-}"
            chmod +x "$PROJECT_PATH/deploy.sh"
            "$PROJECT_PATH/deploy.sh"
