# AgencyOS — Nginx site for PM2 on the VPS (not Docker).
# Install:
#   sudo cp infrastructure/nginx/agencyos.vps.conf /etc/nginx/sites-available/agencyos
#   sudo ln -sfn /etc/nginx/sites-available/agencyos /etc/nginx/sites-enabled/agencyos
#   sudo nginx -t && sudo systemctl reload nginx
#
# Upstream MUST be 127.0.0.1 (not localhost, not Docker service names).

upstream agencyos_frontend {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream agencyos_backend {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name damsole.in www.damsole.in;

  # ACME / redirect to HTTPS (Certbot may manage this block)
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name damsole.in www.damsole.in;

  # Certbot paths — adjust if your cert lives elsewhere
  ssl_certificate     /etc/letsencrypt/live/damsole.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/damsole.in/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20m;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # NestJS API (PM2 → 127.0.0.1:3001, global prefix /api)
  location /api/ {
    proxy_pass http://agencyos_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Next.js (PM2 → 127.0.0.1:3000) including HMR/websockets if used
  location / {
    proxy_pass http://agencyos_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}
